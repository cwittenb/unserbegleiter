<h1>Agenda-Workflow (Sprint 76)</h1>

<h2>2 · Lebenszyklus eines Ziels (Entwicklungsthema)</h2>
<svg viewBox="0 0 680 300" role="img" aria-label="Lebenszyklus eines Ziels">

  <line x1="345" y1="116" x2="345" y2="178" stroke="#5f5e5a" marker-end="url(#b)"/>
