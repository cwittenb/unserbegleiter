<svg width="100%" viewBox="0 0 680 510" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Fluss der Selbstmitteilung durch den Gate in Selbstoffenbarung, Einblick oder Thema</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Das private Reflexionsgespräch erzeugt einen Eintrag für die Zeitleiste und eine Selbstmitteilung. Die Selbstmitteilung läuft durch den Gate und wird nach deiner Wahl zu einer Selbstoffenbarung (privat), einem Einblick im Regal oder einem Thema auf der Agenda. Regal und Agenda speisen die gemeinsame Session.</desc>
